# Merges initdb-generated settings (listen_addresses, etc.), then applies overrides.
include_if_exists = '/var/lib/postgresql/data/postgresql.conf'

# Large HNSW (multi-GB): memory, WAL, SSD planner hints.
# Tune shared_buffers / effective_cache_size to ~25% / ~50–75% of host RAM if needed.
shared_buffers = 1GB
effective_cache_size = 6GB
maintenance_work_mem = 2GB
autovacuum_work_mem = 256MB
work_mem = 128MB
max_connections = 40
max_wal_size = 2GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
random_page_cost = 1.1
effective_io_concurrency = 200
max_parallel_maintenance_workers = 4
max_parallel_workers_per_gather = 4
hnsw.ef_search = 64
